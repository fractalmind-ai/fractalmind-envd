name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Build Linux binary
        run: make build-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: envd-linux-amd64
          path: bin/envd-linux-amd64
